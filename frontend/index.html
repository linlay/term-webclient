<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTY Web Terminal</title>
</head>
<body>
  <div id="app">
    <div class="layout">
      <div id="tabBar" class="tab-bar"></div>

      <main id="terminalArea" class="terminal-area">
        <div id="emptyState" class="empty-state">No windows. Click + to create one.</div>
      </main>
    </div>

    <div id="noticeBar" class="notice hidden"></div>

    <div id="newWindowModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="newWindowTitle">
        <div class="modal-header">
          <h2 id="newWindowTitle" class="modal-title">New Window</h2>
          <button id="advancedToggleBtn" type="button" class="icon-btn" title="Advanced settings">...</button>
        </div>

        <form id="newWindowForm" class="modal-body">
          <label class="field-label" for="toolSelect">Tool</label>
          <select id="toolSelect">
            <option value="terminal">terminal</option>
            <option value="claude">claude</option>
            <option value="codex">codex</option>
            <option value="ssh">ssh</option>
          </select>

          <label class="field-label" for="workdirTree">Workdir</label>
          <div id="workdirTree" class="workdir-tree" role="tree"></div>
          <div class="selected-workdir">Selected: <code id="selectedWorkdirLabel">-</code></div>

          <section id="sshSection" class="advanced-section hidden">
            <label class="field-label" for="sshCredentialIdInput">SSH Credential ID</label>
            <input id="sshCredentialIdInput" type="text" placeholder="credential id (required)">

            <label class="field-label" for="sshHostInput">Host (optional override)</label>
            <input id="sshHostInput" type="text" placeholder="e.g. 10.0.0.2">

            <label class="field-label" for="sshPortInput">Port (optional override)</label>
            <input id="sshPortInput" type="number" min="1" max="65535" placeholder="22">

            <label class="field-label" for="sshUsernameInput">Username (optional override)</label>
            <input id="sshUsernameInput" type="text" placeholder="e.g. ubuntu">

            <label class="field-label" for="sshTermInput">TERM</label>
            <input id="sshTermInput" type="text" placeholder="xterm-256color">
          </section>

          <section id="advancedSection" class="advanced-section hidden">
            <label class="field-label" for="titleInput">Title (optional)</label>
            <input id="titleInput" type="text" placeholder="Tab title">

            <label class="field-label" for="commandInput">Command</label>
            <input id="commandInput" type="text" placeholder="Command">

            <label class="field-label" for="argsInput">Args</label>
            <input id="argsInput" type="text" placeholder="Args, e.g. --model gpt-5">
          </section>

          <div class="modal-actions">
            <button id="cancelNewWindowBtn" type="button" class="ghost-btn">Cancel</button>
            <button id="createNewWindowBtn" type="submit" class="primary-btn">Create Window</button>
          </div>
        </form>
      </div>
    </div>

    <div id="tabContextMenu" class="context-menu hidden" role="menu">
      <button id="contextRebuildBtn" type="button" role="menuitem">Rebuild Session</button>
      <button id="contextCloseBtn" type="button" role="menuitem">Close Tab</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
