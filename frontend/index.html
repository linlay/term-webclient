<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTY Web Terminal</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #090f18;
    }

    .hidden {
      display: none !important;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="loginGate" class="login-gate hidden">
    <form id="loginForm" class="login-card">
      <h1>Sign In</h1>
      <label class="field-label" for="loginUsernameInput">Username</label>
      <input id="loginUsernameInput" type="text" autocomplete="username" required>
      <label class="field-label" for="loginPasswordInput">Password</label>
      <input id="loginPasswordInput" type="password" autocomplete="current-password" required>
      <div id="loginError" class="login-error hidden"></div>
      <button id="loginSubmitBtn" type="submit" class="primary-btn">Login</button>
    </form>
  </div>

  <div id="app" class="hidden">
    <div class="layout">
      <div class="top-row">
        <div id="tabBar" class="tab-bar"></div>
        <div class="top-actions">
          <button
            id="copilotPanelToggleBtn"
            type="button"
            class="ghost-btn top-icon-btn"
            aria-label="Copilot"
            title="Copilot"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2.5 13.8 7l4.7.5-3.5 3 1 4.6L12 12.7l-4 2.4 1-4.6-3.5-3 4.7-.5L12 2.5Z" />
            </svg>
          </button>
          <button
            id="logoutBtn"
            type="button"
            class="ghost-btn top-icon-btn"
            aria-label="Logout"
            title="Logout"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10 4H6.5A1.5 1.5 0 0 0 5 5.5v13A1.5 1.5 0 0 0 6.5 20H10" />
              <path d="M13 8.5 18 12l-5 3.5" />
              <path d="M18 12H9" />
            </svg>
          </button>
        </div>
      </div>

      <div class="main-content">
        <main id="terminalArea" class="terminal-area">
          <div id="emptyState" class="empty-state">No windows. Click + to create one.</div>
          <div id="mobileShortcutBar" class="mobile-shortcut-bar collapsed" aria-label="终端虚拟键盘">
            <button
              id="mobileShortcutToggleBtn"
              type="button"
              class="mobile-shortcut-toggle"
              aria-expanded="false"
              aria-controls="mobileShortcutKeys"
            >
              虚拟键盘
            </button>
            <div id="mobileShortcutKeys" class="mobile-shortcut-keys" role="group" aria-label="终端虚拟按键"></div>
          </div>
        </main>

        <aside id="agentSidebar" class="agent-sidebar hidden">
          <div class="agent-title">Copilot</div>
          <div class="copilot-tabs">
            <button id="copilotSummaryTabBtn" type="button" class="ghost-btn copilot-tab active">Summary</button>
            <button id="copilotAgentTabBtn" type="button" class="ghost-btn copilot-tab">Agent</button>
          </div>
          <div class="agent-session">Session: <code id="agentSessionLabel">-</code></div>

          <section id="copilotSummaryPanel" class="copilot-panel">
            <div class="summary-actions">
              <button id="refreshSessionSummaryBtn" type="button" class="ghost-btn">Refresh</button>
              <button id="copySessionContextBtn" type="button" class="ghost-btn">Copy Context JSON</button>
              <button id="copySessionTranscriptBtn" type="button" class="ghost-btn">Copy Transcript</button>
            </div>

            <label class="field-label" for="sessionSummaryContextText">Structured Context</label>
            <textarea id="sessionSummaryContextText" class="summary-text" rows="8" readonly></textarea>

            <label class="field-label" for="sessionSummaryTranscriptText">Transcript</label>
            <textarea id="sessionSummaryTranscriptText" class="summary-text" rows="8" readonly></textarea>
          </section>

          <section id="copilotAgentPanel" class="copilot-panel hidden">
            <label class="field-label" for="agentQuickCommandInput">Quick Command</label>
            <div class="agent-inline-row">
              <input id="agentQuickCommandInput" type="text" placeholder="e.g. ls -la">
              <button id="agentQuickSendBtn" type="button" class="ghost-btn">Send</button>
            </div>

            <label class="field-label" for="agentInstructionInput">Instruction</label>
            <textarea id="agentInstructionInput" rows="4" placeholder="Use cmd: <command> or input: <raw> for the mock planner."></textarea>

            <label class="field-label" for="agentSelectedPathsInput">Selected Files (one path per line)</label>
            <textarea id="agentSelectedPathsInput" rows="3" placeholder="frontend/src/main.js\nbackend/src/main/resources/application.yml"></textarea>

            <div class="agent-actions-row">
              <button id="agentStartRunBtn" type="button" class="primary-btn">Start Run</button>
              <button id="agentRefreshBtn" type="button" class="ghost-btn">Refresh</button>
            </div>

            <div class="agent-actions-row">
              <button id="agentApproveBtn" type="button" class="ghost-btn">Approve Next</button>
              <button id="agentApproveRiskBtn" type="button" class="ghost-btn">Approve Risk</button>
              <button id="agentAbortBtn" type="button" class="ghost-btn">Abort</button>
            </div>

            <div id="agentRunStatus" class="agent-run-status">No run</div>
            <div id="agentStepsList" class="agent-steps-list"></div>
          </section>
        </aside>
      </div>
    </div>

    <div id="copilotMobileBackdrop" class="copilot-mobile-backdrop hidden" aria-hidden="true"></div>
    <div id="noticeBar" class="notice hidden"></div>

    <div id="newWindowModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="newWindowTitle">
        <div class="modal-header">
          <h2 id="newWindowTitle" class="modal-title">New Window</h2>
        </div>

        <form id="newWindowForm" class="modal-body">
          <label class="field-label" for="toolSelect">Tool</label>
          <select id="toolSelect">
            <option value="terminal">terminal</option>
            <option value="ssh">ssh</option>
          </select>

          <section id="workdirSection" style="overflow-x: hidden;">
            <label class="field-label" for="workdirTree">Workdir</label>
            <div id="workdirTree" class="workdir-tree" role="tree"></div>
            <div class="selected-workdir">Selected: <code id="selectedWorkdirLabel">-</code></div>
          </section>

          <section id="sshSection" class="advanced-section hidden">
            <div class="ssh-heading-row">
              <label class="field-label" for="sshCredentialList">Saved SSH Configs</label>
              <div class="agent-inline-row">
                <button id="sshRefreshCredentialsBtn" type="button" class="ghost-btn">Refresh</button>
                <button id="sshOpenCreateModalBtn" type="button" class="ghost-btn">+ Add</button>
              </div>
            </div>
            <div id="sshCredentialList" class="ssh-credential-list"></div>
            <div class="selected-workdir">Selected SSH: <code id="sshSelectedCredentialIdLabel">-</code></div>

            <input id="sshHostInput" type="text" class="hidden" aria-hidden="true">
            <input id="sshPortInput" type="number" class="hidden" aria-hidden="true">
            <input id="sshUsernameInput" type="text" class="hidden" aria-hidden="true">
            <input id="sshTermInput" type="text" class="hidden" aria-hidden="true" value="xterm-256color">
          </section>

          <section id="advancedSection" class="advanced-section hidden">
            <label class="field-label" for="titleInput">Title (optional)</label>
            <input id="titleInput" type="text" placeholder="Tab title">

            <label class="field-label" for="commandInput">Command</label>
            <input id="commandInput" type="text" placeholder="Command">

            <label class="field-label" for="argsInput">Args</label>
            <input id="argsInput" type="text" placeholder="Args, e.g. --model gpt-5">
          </section>

          <div class="modal-actions">
            <button id="cancelNewWindowBtn" type="button" class="ghost-btn">Cancel</button>
            <button id="createNewWindowBtn" type="submit" class="primary-btn">Create Window</button>
          </div>
        </form>
      </div>
    </div>

    <div id="sshCreateModal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-ssh-create-modal="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="sshCreateTitle">
        <div class="modal-header">
          <h2 id="sshCreateTitle" class="modal-title">Create SSH Config</h2>
        </div>
        <form id="sshCreateForm" class="modal-body">
          <label class="field-label" for="sshCreateHostInput">Host</label>
          <input id="sshCreateHostInput" type="text" placeholder="e.g. 10.0.0.2">

          <label class="field-label" for="sshCreatePortInput">Port</label>
          <input id="sshCreatePortInput" type="number" min="1" max="65535" placeholder="22">

          <label class="field-label" for="sshCreateUsernameInput">Username</label>
          <input id="sshCreateUsernameInput" type="text" placeholder="e.g. ubuntu">

          <label class="field-label" for="sshCreateAuthTypeSelect">Auth Type</label>
          <select id="sshCreateAuthTypeSelect">
            <option value="password">password</option>
            <option value="privateKey">private key</option>
          </select>

          <div id="sshCreatePasswordField">
            <label class="field-label" for="sshCreatePasswordInput">Password</label>
            <input id="sshCreatePasswordInput" type="password" placeholder="password">
          </div>

          <div id="sshCreatePrivateKeyField" class="hidden">
            <label class="field-label" for="sshCreatePrivateKeyInput">Private Key</label>
            <textarea id="sshCreatePrivateKeyInput" rows="6" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
          </div>

          <div id="sshCreatePrivateKeyPassphraseField" class="hidden">
            <label class="field-label" for="sshCreatePrivateKeyPassphraseInput">Private Key Passphrase (optional)</label>
            <input id="sshCreatePrivateKeyPassphraseInput" type="password" placeholder="passphrase">
          </div>

          <div class="modal-actions">
            <button id="cancelSshCreateBtn" type="button" class="ghost-btn">Cancel</button>
            <button id="sshCreateCredentialBtn" type="button" class="primary-btn">Save SSH Config</button>
          </div>
        </form>
      </div>
    </div>

    <div id="tabContextMenu" class="context-menu hidden" role="menu">
      <button id="contextRebuildBtn" type="button" role="menuitem">Rebuild Session</button>
      <button id="contextCloseBtn" type="button" role="menuitem">Close Tab</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
