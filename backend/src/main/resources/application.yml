server:
  address: 127.0.0.1
  port: 8080

spring:
  application:
    name: term-web-backend
  config:
    import:
      - optional:file:application.yml
      - optional:file:.env[.properties]

terminal:
  default-command: codex
  default-args: []
  default-workdir: .
  cli-clients:
    - id: codex
      label: Codex
      command: codex
      args: []
      workdir: .
      env: {}
      pre-commands: []
      shell: /bin/zsh
    - id: claude
      label: Claude Code
      command: claude
      args: []
      workdir: .
      env: {}
      pre-commands: []
      shell: /bin/zsh
  workdir-browse-root: ${user.home}
  allowed-origins:
    - http://*
    - https://*
  session-idle-timeout-seconds: 60
  ws-disconnect-grace-seconds: 30
  detached-session-ttl-seconds: 3600
  ring-buffer-max-bytes: 4194304
  ring-buffer-max-chunks: 4096
  max-cols: 500
  max-rows: 200
  session-event-max-entries: 2048
  command-frame-max-entries: 256
  transcript-max-chars: 200000
  recent-sessions-file: ${TERMINAL_RECENT_SESSIONS_FILE:data/recent-sessions.json}
  recent-sessions-per-tool: ${TERMINAL_RECENT_SESSIONS_PER_TOOL:5}
  agent:
    enabled: true
    step-timeout-seconds: 15
    max-step-result-chars: 8000
    max-context-pack-bytes: 262144
  ssh:
    enabled: true
    default-port: 22
    default-term: xterm-256color
    connect-timeout-millis: 10000
    connection-idle-ttl-seconds: 3600
    exec-default-timeout-seconds: 120
    exec-max-output-bytes: 1048576
    credentials-file: ${TERMINAL_SSH_CREDENTIALS_FILE:data/ssh-credentials.json}
    known-hosts-file: ${user.home}/.term-web/known-hosts.json
    master-key: ${TERMINAL_SSH_MASTER_KEY:}
  files:
    enabled: ${TERMINAL_FILES_ENABLED:false}
    max-upload-file-bytes: 209715200
    max-upload-request-bytes: 524288000
    max-download-archive-bytes: 1073741824
    default-root-scope: SESSION_WORKDIR
    allow-outside-root: false
    allowed-roots: []
    download-ticket-ttl-seconds: 60

auth:
  enabled: ${AUTH_ENABLED:true}
  username: ${AUTH_USERNAME:admin}
  # Generate bcrypt hash: htpasswd -nbBC 10 '' 'yourpassword' | cut -d: -f2
  password-hash-bcrypt: ${AUTH_PASSWORD_HASH_BCRYPT:$2y$10$AZz4SuIf2MU0qLp7JW5VW.0bFnXL4EeoIqEV.oZV9rmOr15bUhUPG}
  session-ttl-seconds: ${AUTH_SESSION_TTL_SECONDS:43200}
  login-rate-limit-enabled: ${AUTH_LOGIN_RATE_LIMIT_ENABLED:true}
  login-rate-limit-window-seconds: ${AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  login-rate-limit-max-attempts: ${AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:10}

app-auth:
  enabled: ${APP_AUTH_ENABLED:true}
  # local-public-key takes precedence over jwks-uri when configured.
  local-public-key: ${APP_AUTH_LOCAL_PUBLIC_KEY:}
  jwks-uri: ${APP_AUTH_JWKS_URI:}
  issuer: ${APP_AUTH_ISSUER:}
  jwks-cache-seconds: ${APP_AUTH_JWKS_CACHE_SECONDS:300}
  audience: ${APP_AUTH_AUDIENCE:}
  clock-skew-seconds: ${APP_AUTH_CLOCK_SKEW_SECONDS:30}

logging:
  pattern:
    level: "%5p [req:%X{requestId:-} sess:%X{sessionId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info
