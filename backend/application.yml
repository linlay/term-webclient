# External deployment overrides for backend.
# This file is imported by src/main/resources/application.yml with higher precedence.

server:
  address: 127.0.0.1
  port: 11930

terminal:
  cli-clients:
    - id: codex
      label: Codex
      command: codex
      args: []
      workdir: .
      env: {}
      pre-commands:
        - export https_proxy="http://127.0.0.1:8001"
        - export HTTPS_PROXY="http://127.0.0.1:8001"
      shell: /bin/zsh
    - id: claude
      label: Claude Code
      command: claude
      args: []
      workdir: .
      env: {}
      pre-commands:
        - export https_proxy="http://127.0.0.1:8001"
        - export HTTPS_PROXY="http://127.0.0.1:8001"
      shell: /bin/zsh
  auth:
    enabled: true
    username: admin
    # Prefer BCrypt for production credentials. Keep password-hash for migration compatibility.
    # password-hash-bcrypt:
    password-hash: f49df27cfc01afd17366e851e15e7754
    session-ttl-seconds: 43200
    login-rate-limit-enabled: true
    login-rate-limit-window-seconds: 60
    login-rate-limit-max-attempts: 10
  app-auth:
    enabled: true
    # local-public-key takes precedence over jwks-uri when configured.
    local-public-key: ""
    jwks-uri: ""
    issuer: ""
    jwks-cache-seconds: 300
    audience: ""
    clock-skew-seconds: 30
  ssh:
    credentials-file: data/ssh-credentials.json
    master-key: 123456
